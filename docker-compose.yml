version: '3.8'

services:
  db:
    image: postgres:15
    container_name: catsyndicate_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cats_secret_password  # Можешь поменять на свой
      POSTGRES_DB: catsyndicate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: catsyndicate_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@syndicate.com # Логин для входа в панель
      PGADMIN_DEFAULT_PASSWORD: admin            # Пароль для входа
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  postgres_data: